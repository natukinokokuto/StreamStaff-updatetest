
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SS 著作権管理プレビュー</title>
<style>
body{background:#111;color:white;font-family:sans-serif;padding:20px}
.box{background:#1f1f1f;border-radius:14px;padding:16px;margin-bottom:16px}
.ok{color:#7dff7d}.warn{color:#ffe27a}.bad{color:#ff7d7d}
</style>
</head>
<body>
<h1>🎤 StreamStaff 著作権管理</h1>
<div class="box">
<h2>YouTube</h2>
<p class="ok">🎤 生歌だけ配信：○ OK寄り</p>
<p class="warn">📼 配信をあとで見返せるように残す：△ 音が消えることあり</p>
<p class="bad">✂ ショート動画：❌ やめた方が安全</p>
<p class="bad">💿 CDの音をそのまま流す：❌ 注意</p>
</div>
<div class="box">
<h2>Twitch</h2>
<p class="ok">🎤 生歌だけ配信：○ OK寄り</p>
<p class="warn">📼 配信を残す：△ 注意</p>
</div>
</body>
</html>
