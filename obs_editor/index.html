
<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>OBS画面エディタ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>OBS画面エディタ v139</h1>

<div class="layout-grid">
<div class="slot"><h3>左上</h3></div>
<div class="slot"><h3>上中央</h3></div>
<div class="slot"><h3>右上</h3></div>
<div class="slot"><h3>左</h3></div>
<div class="slot"><h3>中央</h3></div>
<div class="slot"><h3>右</h3></div>
<div class="slot"><h3>左下</h3></div>
<div class="slot"><h3>下中央</h3></div>
<div class="slot"><h3>右下</h3></div>
</div>

<div class="merge-panel">
<button>上段を結合</button>
<button>中段を結合</button>
<button>下段を結合</button>
<button>左列を結合</button>
<button>中央列を結合</button>
<button>右列を結合</button>
<button>全体表示</button>
</div>
</body>
</html>
