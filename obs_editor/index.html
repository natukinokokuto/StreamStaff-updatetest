
<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>OBSセル結合エディタ</title>
<style>
body{background:#111;color:#fff;font-family:sans-serif;padding:20px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.cell{height:120px;background:#222;border:2px solid #555;border-radius:12px;
display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<h1>OBSセル結合エディタ</h1>
<div class="grid">
<div class="cell">左上</div>
<div class="cell">上中央</div>
<div class="cell">右上</div>
<div class="cell">左</div>
<div class="cell">中央</div>
<div class="cell">右</div>
<div class="cell">左下</div>
<div class="cell">下中央</div>
<div class="cell">右下</div>
</div>
</body>
</html>
