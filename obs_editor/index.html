
<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>OBSセル結合エディタ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>OBSセル結合型レイアウトエディタ</h1>

<div class="topbar">
<select id="contentSelect">
<option>幹</option>
<option>枝</option>
<option>葉</option>
<option>コメント</option>
<option>時計</option>
<option>お知らせ</option>
<option>カレンダー</option>
<option>常連メモ</option>
<option>テロップ</option>
<option>ルーレット結果</option>
<option>枠のみ</option>
<option>空白</option>
</select>

<button onclick="applyContent()">内容適用</button>
<button onclick="mergeCells()">セル結合</button>
<button onclick="hideCells()">非表示</button>
<button onclick="resetGrid()">リセット</button>
</div>

<div class="grid" id="grid">
<div class="cell" data-id="1">左上</div>
<div class="cell" data-id="2">上中央</div>
<div class="cell" data-id="3">右上</div>

<div class="cell" data-id="4">左</div>
<div class="cell center" data-id="5">中央</div>
<div class="cell" data-id="6">右</div>

<div class="cell" data-id="7">左下</div>
<div class="cell" data-id="8">下中央</div>
<div class="cell" data-id="9">右下</div>
</div>

<div class="presets">
<h2>段・列プリセット</h2>

<button onclick="mergePreset([1,2,3])">上段</button>
<button onclick="mergePreset([4,5,6])">中段</button>
<button onclick="mergePreset([7,8,9])">下段</button>

<button onclick="mergePreset([1,4,7])">左列</button>
<button onclick="mergePreset([2,5,8])">中央列</button>
<button onclick="mergePreset([3,6,9])">右列</button>

<button onclick="mergePreset([1,2,3,4,5,6,7,8,9])">全体</button>
</div>

<p class="note">
複数セルをクリック → セル結合でOBS構図を直感的に作れる
</p>

<script src="editor.js"></script>
</body>
</html>
