
<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>OBS Overlay</title>
<style>
html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;
background:transparent;
font-family:sans-serif;
}

#overlay{
position:fixed;
inset:0;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:50px 1fr 50px;
gap:8px;
padding:12px;
box-sizing:border-box;
}

.slot{
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:8px;
font-weight:bold;
font-size:24px;
overflow:hidden;
white-space:pre-line;
}

.empty{
background:transparent !important;
border:none !important;
}

.comment{
align-items:flex-start;
justify-content:flex-start;
padding:16px;
font-size:18px;
line-height:1.5;
}
</style>
</head>
<body>

<div id="overlay"></div>

<script>
const slotOrder = [
"topLeft","topCenter","topRight",
"midLeft","midCenter","midRight",
"bottomLeft","bottomCenter","bottomRight"
];

function nowTime(){
 const d = new Date();
 return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}

function load(){
 try{
   return JSON.parse(localStorage.getItem("ss_obs_9slot_layout") || '{"slots":{},"colors":{}}');
 }catch(e){
   return {"slots":{},"colors":{}};
 }
}

function renderLabel(value,data){
 if(!value || value==="空白") return "";

 if(value==="タイトル"){
   return data.titleText || "";
 }

 if(value==="時計"){
   return nowTime();
 }

 if(value==="タイトル＋時計"){
   return (data.titleText || "") + " " + nowTime();
 }

 if(value==="テロップ文"){
   return data.tickerText || "";
 }

 if(value==="テロップ文＋時計"){
   return (data.tickerText || "") + " " + nowTime();
 }

 if(value==="コメント枠"){
   return "コメント\nコメント\nコメント";
 }

 if(value==="幹"){
   return "雑談テーマ";
 }

 if(value==="枠のみ"){
   return "";
 }

 return value;
}

function render(){
 const data = load();
 const overlay = document.getElementById("overlay");
 overlay.innerHTML = "";

 const c = data.colors || {};

 slotOrder.forEach(key=>{
   const value = (data.slots && data.slots[key]) || "空白";

   const div = document.createElement("div");
   div.className = "slot";

   if(value==="空白"){
      div.classList.add("empty");
   }

   if(value==="コメント枠"){
      div.classList.add("comment");
   }

   div.style.background = c.panel || "rgba(0,0,0,.35)";
   div.style.border = "2px solid " + (c.frame || "#555");
   div.style.color = c.text || "#fff";

   if(value==="空白"){
      div.style.background = "transparent";
      div.style.border = "none";
   }

   div.textContent = renderLabel(value,data);

   overlay.appendChild(div);
 });
}

window.addEventListener("storage", render);
setInterval(render,1000);
render();
</script>

</body>
</html>
