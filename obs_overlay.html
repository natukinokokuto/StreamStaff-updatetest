<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>StreamStaff OBS Overlay</title>
<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:transparent;
  font-family:sans-serif;
}
#overlayGrid{
  width:100vw;
  height:100vh;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:48px 1fr 48px;
  gap:10px;
  padding:10px;
  box-sizing:border-box;
}
.cell{
  border:2px solid rgba(255,255,255,.45);
  border-radius:16px;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.35);
  backdrop-filter:blur(4px);
  overflow:hidden;
  position:relative;
  font-weight:700;
  text-shadow:0 2px 4px rgba(0,0,0,.7);
}
.empty{
  border-color:transparent !important;
  background:transparent !important;
}
.ticker{
  justify-content:flex-start;
  white-space:nowrap;
  overflow:hidden;
}
.runner{
  display:block;
  white-space:nowrap;
  color:inherit;
  visibility:visible;
  opacity:1;
  position:relative;
  transform:none;
  padding-left:0;
}
  to{ left:0%; transform:translateX(-100%); }
}


  100%{ transform:translateX(-100%); }
}



  100%{ transform:translateX(-100%); }
}

@keyframes tickerBandMove{
  0%{
    transform:translateX(100%);
  }
  100%{
    transform:translateX(-120%);
  }
}

</style>

<style id="v184TickerLayerFix">
.cell.ticker,
.ticker{
  position:relative !important;
  z-index:50 !important;
  overflow:hidden !important;
  min-height:36px !important;
  opacity:1 !important;
  visibility:visible !important;
}

.cell.ticker .runner,
.ticker .runner,
.runner{
  position:relative !important;
  z-index:999 !important;
  display:block !important;
  color:#ffffff !important;
  opacity:1 !important;
  visibility:visible !important;
  text-shadow:0 2px 6px rgba(0,0,0,.9) !important;
  background:transparent !important;
  white-space:nowrap !important;
  transform:none !important;
  left:auto !important;
  top:auto !important;
}

.cell.empty .runner,
.empty .runner{
  display:none !important;
}
</style>


<style id="v187TickerBandDebug">
/* テロップ帯デバッグ表示 */
.cell.ticker{
  background:rgba(255,255,255,.10) !important;
  border:2px dashed red !important;
}

.cell.ticker .runner{
  background:rgba(255,255,255,.25) !important;
  border:2px solid #00ffff !important;
  padding:4px 24px !important;
  width:max-content !important;
}
</style>


<style id="v188ForceTickerBandMove">
.cell.ticker{
  position:relative !important;
  overflow:hidden !important;
}

.cell.ticker .runner{
  position:absolute !important;
  left:0 !important;
  top:50% !important;
  display:inline-block !important;
  width:max-content !important;
  min-width:max-content !important;
  white-space:nowrap !important;
  transform:translateY(-50%) !important;
  animation:v188ForceTickerMove 12s linear infinite !important;
  background:rgba(255,255,255,.25) !important;
  border:2px solid #00ffff !important;
  padding:4px 24px !important;
  z-index:999 !important;
}

@keyframes v188ForceTickerMove{
  0%{
    transform:translate(100vw,-50%) !important;
  }
  100%{
    transform:translate(-100%,-50%) !important;
  }
}
</style>

</head>
<body>
<div id="overlayGrid"></div>

<script>
(function(){

const grid = document.getElementById("overlayGrid");

function nowTime(){
  const d = new Date();
  return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}

function loadData(){
  try{
    return JSON.parse(localStorage.getItem("ss_obs_9slot_layout") || "{}");
  }catch(e){
    return {};
  }
}

function textFor(value){
  const title = localStorage.getItem("ss_obs_title_text") || "タイトル";
  const ticker = localStorage.getItem("ss_obs_ticker_text") || "テロップ文";

  if(!value || value === "空白") return "";
  if(value === "タイトル") return title;
  if(value === "時計") return nowTime();
  if(value === "タイトル＋時計") return title + "　" + nowTime();
  if(value === "テロップ文") return ticker || "テロップ文";
  if(value === "テロップ文＋時計") return (ticker || "テロップ文") + "　" + nowTime();
  if(value === "枠のみ") return "";
  return value;
}

function mergeRows(data){
  const m = (data.merge || {});
  function row(prefix,rowNum){
    const cap = prefix.charAt(0).toUpperCase()+prefix.slice(1);
    const left = prefix+"Left";
    const center = prefix+"Center";
    const right = prefix+"Right";

    const mergeLeft = !!m["obsMerge"+cap+"Left"];
    const mergeRight = !!m["obsMerge"+cap+"Right"];

    if(mergeLeft && mergeRight){
      return [{key:left,row:rowNum,col:1,span:3}];
    }
    if(mergeLeft){
      return [
        {key:left,row:rowNum,col:1,span:2},
        {key:right,row:rowNum,col:3,span:1}
      ];
    }
    if(mergeRight){
      return [
        {key:left,row:rowNum,col:1,span:1},
        {key:center,row:rowNum,col:2,span:2}
      ];
    }

    return [
      {key:left,row:rowNum,col:1,span:1},
      {key:center,row:rowNum,col:2,span:1},
      {key:right,row:rowNum,col:3,span:1}
    ];
  }

  return [
    ...row("top",1),
    ...row("mid",2),
    ...row("bottom",3)
  ];
}


let lastRenderSignature = "";

function render(force){

  const data = loadData();
  const signature = JSON.stringify(data);
  if(!force && signature === lastRenderSignature) return;
  lastRenderSignature = signature;

  const slots = data.slots || {};

  grid.innerHTML = "";

  mergeRows(data).forEach(item=>{

    const value = slots[item.key] || "空白";

    const cell = document.createElement("div");
    cell.className = "cell";

    cell.style.gridRow = item.row;
    cell.style.gridColumn = item.col + " / span " + item.span;

    if(value === "空白"){
      cell.classList.add("empty");
    }else if(item.row === 3 && value.indexOf("テロップ") >= 0){

      cell.classList.add("ticker");
      cell.style.zIndex = "50";
      cell.style.position = "relative";
      cell.style.opacity = "1";
      cell.style.visibility = "visible";

      const runner = document.createElement("div");
      runner.className = "runner";
      runner.textContent = textFor(value) || "テロップ文";
      runner.style.display = "block";
      runner.style.position = "relative";
      runner.style.zIndex = "999";
      runner.style.color = "#ffffff";
      runner.style.opacity = "1";
      runner.style.visibility = "visible";
      const tickerScrollEnabled = localStorage.getItem("ss_obs_ticker_scroll") !== "false";
      if(tickerScrollEnabled){
        runner.style.animation = "tickerBandMove 16s linear infinite";
      }else{
        runner.style.animation = "none";
        runner.style.transform = "none";
      }

      cell.appendChild(runner);
      runner.style.position = "absolute";
      runner.style.left = "0";
      runner.style.top = "50%";
      runner.style.animation = "v188ForceTickerMove 12s linear infinite";
      runner.style.width = "max-content";
      runner.style.minWidth = "max-content";

    }else{
      cell.textContent = textFor(value);
    }

    grid.appendChild(cell);
  });
}

render(true);

window.addEventListener("storage", ()=>render(true));
setInterval(()=>render(false),1000);

})();
</script>
</body>
</html>
