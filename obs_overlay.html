<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>OBS Overlay</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent;font-family:sans-serif}
#overlay{position:fixed;inset:0;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:50px minmax(0,1fr) 50px;gap:8px;padding:12px;box-sizing:border-box}
.slot{border-radius:14px;display:flex;align-items:center;justify-content:center;text-align:center;padding:8px 12px;font-weight:bold;font-size:24px;overflow:hidden;white-space:pre-line;text-shadow:0 2px 6px rgba(0,0,0,.55);box-sizing:border-box}
.slot.topbar{font-size:22px;white-space:nowrap;text-overflow:ellipsis}
.slot.ticker{font-size:20px;white-space:nowrap;justify-content:flex-start;overflow:hidden;position:relative}
.ticker-runner{position:absolute;top:50%;left:100%;transform:translateY(-50%);white-space:nowrap;display:inline-block;animation:slotTickerMove 14s linear infinite;will-change:left,transform}
@keyframes slotTickerMove{from{left:100%;transform:translate(0,-50%)}to{left:0%;transform:translate(-100%,-50%)}}
.slot.empty{background:transparent!important;border:none!important}
</style>
</head>
<body>
<div id="overlay"></div>
<script>
const APP_STATE_KEY = "stream_manager_integrated_v1";

function nowTime(){
 const d = new Date();
 return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}
function readJson(key, fallback){
 try{return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback));}
 catch(e){return fallback;}
}
function readAppState(){
 try{return JSON.parse(localStorage.getItem(APP_STATE_KEY) || "{}") || {};}
 catch(e){return {};}
}
function cleanText(v){
 if(v == null) return "";
 if(typeof v === "string" || typeof v === "number") return String(v).trim();
 if(Array.isArray(v)) return v.map(cleanText).filter(Boolean).slice(0,4).join(" / ");
 if(typeof v === "object"){
   const keys = ["title","text","memo","body","content","value","item","name","label","trunk","branch","leaf","main"];
   for(const k of keys){ const hit = cleanText(v[k]); if(hit) return hit; }
 }
 return "";
}
function findDeepByKey(obj, keyRegex){
 if(!obj || typeof obj !== "object") return "";
 if(Array.isArray(obj)){
   for(const x of obj){ const hit = findDeepByKey(x, keyRegex); if(hit) return hit; }
   return "";
 }
 for(const [k,v] of Object.entries(obj)){
   if(keyRegex.test(k)){
     const hit = cleanText(v);
     if(hit) return hit;
   }
 }
 for(const v of Object.values(obj)){
   const hit = findDeepByKey(v, keyRegex);
   if(hit) return hit;
 }
 return "";
}
function latestStreamMemo(state){
 let direct = findDeepByKey(state, /(streamMemo|homeMemo|broadcastMemo|deliveryMemo|йЕНдњ°гГ°гГҐ|memoText|mainMemo)/i);
 if(direct) return direct;
 const logs = Array.isArray(state.logs) ? state.logs : [];
 const titled = logs.find(x => cleanText(x && (x.title || x.name || x.label)).includes("йЕНдњ°гГ°гГҐ"));
 if(titled){
   const hit = cleanText(titled.text || titled.memo || titled.body || titled.content || titled.value || titled.item);
   if(hit) return hit;
 }
 for(const x of logs){
   const hit = cleanText(x && (x.text || x.memo || x.body || x.content || x.value || x.item));
   if(hit) return hit;
 }
 return "";
}
function syncedValue(kind){
 const state = readAppState();
 const tree = state.tree || {};
 if(kind === "йЕНдњ°гГ°гГҐ") return latestStreamMemo(state) || "йЕНдњ°гГ°гГҐ";
 if(kind === "еєє") return cleanText(tree.trunk) || findDeepByKey(state, /trunk|еєє|mainTheme|theme/i) || "дїКжЧ•гБЃгГ°гВ§гГ≥гГЖгГЉгГЮ";
 if(kind === "жЮЭ") return cleanText(tree.branch) || findDeepByKey(state, /branch|жЮЭ|subTheme/i) || "жЮЭ";
 if(kind === "иСЙ") return cleanText(tree.leaf) || findDeepByKey(state, /leaf|иСЙ|listenerPoint/i) || "иСЙ";
 if(kind === "гБКзЯ•гВЙгБЫ"){
   const ev = Array.isArray(state.calendarEvents) ? state.calendarEvents[0] : null;
   return cleanText(ev && (ev.item || ev.title || ev.type || ev.text)) || findDeepByKey(state, /notice|гБКзЯ•гВЙгБЫ/i) || "гБКзЯ•гВЙгБЫ";
 }
 if(kind === "еЄЄйА£гГ°гГҐ"){
   const l = Array.isArray(state.listeners) ? state.listeners[0] : null;
   return l ? [l.name, l.memo].map(cleanText).filter(Boolean).join("пЉЪ") : (findDeepByKey(state, /regular|listener|еЄЄйА£/i) || "еЄЄйА£гГ°гГҐ");
 }
 if(kind === "гВЂгГђгГ≥гГАгГЉ"){
   const ev = Array.isArray(state.calendarEvents) ? state.calendarEvents[0] : null;
   return ev ? [ev.date, ev.item || ev.title || ev.type].map(cleanText).filter(Boolean).join(" ") : (findDeepByKey(state, /calendar|event|дЇИеЃЪ/i) || "гВЂгГђгГ≥гГАгГЉ");
 }
 if(kind === "гГЂгГЉгГђгГГгГИзµРжЮЬ"){
   const h = state.roulette && Array.isArray(state.roulette.history) ? state.roulette.history[0] : null;
   return cleanText(h) || findDeepByKey(state, /roulette|гГЂгГЉгГђгГГгГИ/i) || "гГЂгГЉгГђгГГгГИзµРжЮЬ";
 }
 if(kind === "гВЂгВ¶гГ≥гГИгГАгВ¶гГ≥"){
   const cd = Array.isArray(state.countdowns) ? state.countdowns[0] : null;
   return cd ? [cd.title, cd.target].map(cleanText).filter(Boolean).join(" ") : (findDeepByKey(state, /countdown|timer|гВЂгВ¶гГ≥гГИ/i) || "гВЂгВ¶гГ≥гГИгГАгВ¶гГ≥");
 }
 return "";
}
function defaultData(){
 return {slots:{},merge:{},titleText:"",tickerText:"",tickerScroll:true,colors:{bg:"transparent",frame:"#555555",text:"#ffffff",panel:"rgba(0,0,0,.35)"}};
}
function load(){
 const d = Object.assign(defaultData(), readJson("ss_obs_9slot_layout", defaultData()));
 d.slots = d.slots || {};
 d.merge = d.merge || {};
 d.colors = Object.assign(defaultData().colors, d.colors || {});
 if(!d.titleText) d.titleText = localStorage.getItem("ss_obs_title_text") || "";
 if(!d.tickerText) d.tickerText = localStorage.getItem("ss_obs_ticker_text") || "";
 if(localStorage.getItem("ss_obs_ticker_scroll") === "0") d.tickerScroll = false;
 return d;
}
function labelFor(value,data){
 if(!value || value==="з©ЇзЩљ") return "";
 if(value==="гВњгВ§гГИгГЂ") return data.titleText || localStorage.getItem("ss_obs_title_text") || "";
 if(value==="жЩВи®И") return nowTime();
 if(value==="гВњгВ§гГИгГЂпЉЛжЩВи®И"){
   const title = data.titleText || localStorage.getItem("ss_obs_title_text") || "";
   return title ? title+"гАА"+nowTime() : nowTime();
 }
 if(value==="гГЖгГ≠гГГгГЧжЦЗ") return data.tickerText || localStorage.getItem("ss_obs_ticker_text") || "";
 if(value==="гГЖгГ≠гГГгГЧжЦЗпЉЛжЩВи®И"){
   const ticker = data.tickerText || localStorage.getItem("ss_obs_ticker_text") || "";
   return ticker ? ticker+"гАА"+nowTime() : nowTime();
 }
 if(value==="жЮ†гБЃгБњ") return "";
 return syncedValue(value) || value;
}
function layoutItems(data){
 const m = data.merge || {};
 function row(prefix,rowNum){
   const cap = prefix.charAt(0).toUpperCase()+prefix.slice(1);
   const leftKey = prefix+"Left", centerKey = prefix+"Center", rightKey = prefix+"Right";
   const mergeLeft = !!m["obsMerge"+cap+"Left"];
   const mergeRight = !!m["obsMerge"+cap+"Right"];
   if(mergeLeft && mergeRight) return [{key:leftKey,row:rowNum,col:1,colSpan:3}];
   if(mergeLeft) return [{key:leftKey,row:rowNum,col:1,colSpan:2},{key:rightKey,row:rowNum,col:3,colSpan:1}];
   if(mergeRight) return [{key:leftKey,row:rowNum,col:1,colSpan:1},{key:centerKey,row:rowNum,col:2,colSpan:2}];
   return [{key:leftKey,row:rowNum,col:1,colSpan:1},{key:centerKey,row:rowNum,col:2,colSpan:1},{key:rightKey,row:rowNum,col:3,colSpan:1}];
 }
 return [...row("top",1),...row("mid",2),...row("bottom",3)];
}
function render(){
 const data = load();
 const overlay = document.getElementById("overlay");
 overlay.innerHTML = "";
 const c = data.colors || {};
 document.body.style.background = c.bg || "transparent";
 layoutItems(data).forEach(item=>{
   const value = (data.slots && data.slots[item.key]) || "з©ЇзЩљ";
   const div = document.createElement("div");
   div.className = "slot";
   div.style.gridRow = item.row;
   div.style.gridColumn = item.col + " / span " + item.colSpan;
   if(item.row===1) div.classList.add("topbar");
   if(item.row===3) div.classList.add("ticker");
   div.style.background = c.panel || "rgba(0,0,0,.35)";
   div.style.border = "2px solid " + (c.frame || "#555");
   div.style.color = c.text || "#fff";
   if(value==="з©ЇзЩљ") div.classList.add("empty");
   const text = labelFor(value,data);
   if(item.row === 3 && value.indexOf("гГЖгГ≠гГГгГЧжЦЗ") >= 0 && text && data.tickerScroll !== false){
     const runner = document.createElement("span");
     runner.className = "ticker-runner";
     runner.textContent = text;
     div.appendChild(runner);
   }else{
     div.textContent = text;
   }
   overlay.appendChild(div);
 });
}
window.addEventListener("storage", render);
window.addEventListener("focus", render);
document.addEventListener("visibilitychange", render);
setInterval(render,300);
render();
</script>
</body>
</html>
