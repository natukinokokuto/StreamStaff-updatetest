<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>StreamStaff OBS Overlay</title>
<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:transparent;
  font-family:sans-serif;
}
#overlayGrid{
  width:100vw;
  height:100vh;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:48px 1fr 48px;
  gap:10px;
  padding:10px;
  box-sizing:border-box;
}
.cell{
  border:2px solid rgba(255,255,255,.45);
  border-radius:16px;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.35);
  backdrop-filter:blur(4px);
  overflow:hidden;
  position:relative;
  font-weight:700;
  text-shadow:0 2px 4px rgba(0,0,0,.7);
}
.empty{
  border-color:transparent !important;
  background:transparent !important;
}
.ticker{
  justify-content:flex-start;
  white-space:nowrap;
  overflow:hidden;
}
.runner{
  display:block;
  white-space:nowrap;
  color:inherit;
  visibility:visible;
  opacity:1;
  position:relative;
  transform:none;
  padding-left:0;
}
  to{ left:0%; transform:translateX(-100%); }
}


  100%{ transform:translateX(-100%); }
}


@keyframes tickerLoop{
  0%{ transform:translateX(100%); }
  100%{ transform:translateX(-100%); }
}
</style>

<style id="v184TickerLayerFix">
.cell.ticker,
.ticker{
  position:relative !important;
  z-index:50 !important;
  overflow:hidden !important;
  min-height:36px !important;
  opacity:1 !important;
  visibility:visible !important;
}

.cell.ticker .runner,
.ticker .runner,
.runner{
  position:relative !important;
  z-index:999 !important;
  display:block !important;
  color:#ffffff !important;
  opacity:1 !important;
  visibility:visible !important;
  text-shadow:0 2px 6px rgba(0,0,0,.9) !important;
  background:transparent !important;
  white-space:nowrap !important;
  transform:none !important;
  left:auto !important;
  top:auto !important;
}

.cell.empty .runner,
.empty .runner{
  display:none !important;
}
</style>


<style id="v189IndependentTickerLayer">
#ssTickerLayer{
  position:absolute;
  left:10px;
  right:10px;
  bottom:10px;
  height:48px;
  overflow:hidden;
  pointer-events:none;
  z-index:9999;
  display:none;
  border:2px dashed red;
  background:rgba(255,255,255,.08);
  border-radius:14px;
}

#ssTickerTrack{
  position:absolute;
  left:0;
  top:50%;
  transform:translateY(-50%);
  white-space:nowrap;
  width:max-content;
  min-width:max-content;
  color:#fff;
  font-size:28px;
  font-weight:900;
  text-shadow:0 2px 6px rgba(0,0,0,.9);
  background:rgba(0,255,255,.18);
  border:2px solid cyan;
  padding:4px 24px;
  animation:ssTickerMove 16s linear infinite;
}

@keyframes ssTickerMove{
  0%{
    transform:translate(100vw,-50%);
  }
  100%{
    transform:translate(-100%,-50%);
  }
}
</style>

</head>
<body>
<div id="overlayGrid"></div>

<script>
(function(){

const grid = document.getElementById("overlayGrid");

function nowTime(){
  const d = new Date();
  return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}

function loadData(){
  try{
    return JSON.parse(localStorage.getItem("ss_obs_9slot_layout") || "{}");
  }catch(e){
    return {};
  }
}

function textFor(value){
  const title = localStorage.getItem("ss_obs_title_text") || "タイトル";
  const ticker = localStorage.getItem("ss_obs_ticker_text") || "テロップ文";

  if(!value || value === "空白") return "";
  if(value === "タイトル") return title;
  if(value === "時計") return nowTime();
  if(value === "タイトル＋時計") return title + "　" + nowTime();
  if(value === "テロップ文") return ticker || "テロップ文";
  if(value === "テロップ文＋時計") return (ticker || "テロップ文") + "　" + nowTime();
  if(value === "枠のみ") return "";
  return value;
}

function mergeRows(data){
  const m = (data.merge || {});
  function row(prefix,rowNum){
    const cap = prefix.charAt(0).toUpperCase()+prefix.slice(1);
    const left = prefix+"Left";
    const center = prefix+"Center";
    const right = prefix+"Right";

    const mergeLeft = !!m["obsMerge"+cap+"Left"];
    const mergeRight = !!m["obsMerge"+cap+"Right"];

    if(mergeLeft && mergeRight){
      return [{key:left,row:rowNum,col:1,span:3}];
    }
    if(mergeLeft){
      return [
        {key:left,row:rowNum,col:1,span:2},
        {key:right,row:rowNum,col:3,span:1}
      ];
    }
    if(mergeRight){
      return [
        {key:left,row:rowNum,col:1,span:1},
        {key:center,row:rowNum,col:2,span:2}
      ];
    }

    return [
      {key:left,row:rowNum,col:1,span:1},
      {key:center,row:rowNum,col:2,span:1},
      {key:right,row:rowNum,col:3,span:1}
    ];
  }

  return [
    ...row("top",1),
    ...row("mid",2),
    ...row("bottom",3)
  ];
}


let lastRenderSignature = "";

function render(force){

  const data = loadData();
  const signature = JSON.stringify(data);
  if(!force && signature === lastRenderSignature) return;
  lastRenderSignature = signature;

  const slots = data.slots || {};

  grid.innerHTML = "";

  mergeRows(data).forEach(item=>{

    const value = slots[item.key] || "空白";

    const cell = document.createElement("div");
    cell.className = "cell";

    cell.style.gridRow = item.row;
    cell.style.gridColumn = item.col + " / span " + item.span;

    if(value === "空白"){
      cell.classList.add("empty");
    }else if(item.row === 3 && value.indexOf("テロップ") >= 0){

      cell.classList.add("empty");

    }else{
      cell.textContent = textFor(value);
    }

    grid.appendChild(cell);
  });
}

render(true);

window.addEventListener("storage", ()=>render(true));
setInterval(()=>render(false),1000);

})();
</script>

<div id="ssTickerLayer">
  <div id="ssTickerTrack">テロップ確認中</div>
</div>


<script id="v189TickerLayerScript">
(function(){

  function updateTickerLayer(){

    const layer = document.getElementById("ssTickerLayer");
    const track = document.getElementById("ssTickerTrack");

    if(!layer || !track) return;

    let data = {};
    try{
      data = JSON.parse(localStorage.getItem("ss_obs_9slot_layout") || "{}");
    }catch(e){}

    const slots = data.slots || {};

    const hasTicker =
      slots.bottomLeft === "テロップ文" ||
      slots.bottomCenter === "テロップ文" ||
      slots.bottomRight === "テロップ文" ||
      slots.bottomLeft === "テロップ文＋時計" ||
      slots.bottomCenter === "テロップ文＋時計" ||
      slots.bottomRight === "テロップ文＋時計";

    if(!hasTicker){
      layer.style.display = "none";
      return;
    }

    const tickerText =
      localStorage.getItem("ss_obs_ticker_text") ||
      data.tickerText ||
      "テロップ文";

    layer.style.display = "block";
    track.textContent = tickerText;

    const scrollEnabled =
      localStorage.getItem("ss_obs_ticker_scroll") !== "false";

    if(scrollEnabled){
      track.style.animation = "ssTickerMove 16s linear infinite";
    }else{
      track.style.animation = "none";
      track.style.transform = "translate(0,-50%)";
    }
  }

  updateTickerLayer();

  window.addEventListener("storage", updateTickerLayer);

  setInterval(updateTickerLayer, 1000);

})();
</script>

</body>
</html>
