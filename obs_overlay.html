<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>StreamStaff OBS Overlay</title>
<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:transparent;
  font-family:sans-serif;
}
#overlayGrid{
  width:100vw;
  height:100vh;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:48px 1fr 48px;
  gap:10px;
  padding:10px;
  box-sizing:border-box;
}
.cell{
  border:2px solid rgba(255,255,255,.45);
  border-radius:16px;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.35);
  backdrop-filter:blur(4px);
  overflow:hidden;
  position:relative;
  font-weight:700;
  text-shadow:0 2px 4px rgba(0,0,0,.7);
}
.empty{
  border-color:transparent !important;
  background:transparent !important;
}
.ticker{
  justify-content:flex-start;
  white-space:nowrap;
  overflow:hidden;
}
.runner{
  display:block;
  white-space:nowrap;
  color:inherit;
  visibility:visible;
  opacity:1;
  position:relative;
  transform:none;
  padding-left:0;
}
  to{ left:0%; transform:translateX(-100%); }
}


  100%{ transform:translateX(-100%); }
}


@keyframes tickerLoop{
  0%{ transform:translateX(100%); }
  100%{ transform:translateX(-100%); }
}
</style>

.ticker{

.ticker .runner,

  opacity:1 !important;

  background:transparent !important;

  transform:none !important;
  left:auto !important;
  top:auto !important;
}

.cell.empty .runner,
.empty .runner{
  display:none !important;
}
</style>

<style id="v218TickerLayerScopedCss">
#ssTickerLayer{

  pointer-events:none;

<style id="v219TickerScopedBorderFix">
#ssTickerLayer{
  border:2px solid rgba(255,255,255,.45) !important;

/* テロップ担当になった下段セル側は、専用レイヤーと枠が二重にならないよう完全透明 */
#overlayGrid .cell.empty{
  border-color:transparent !important;

}

<style id="v235_4StreamMemoAutoFitCss">
.cell .stream-memo-text{
  width:100%;
  height:100%;
  box-sizing:border-box;
  padding:14px 18px;
  display:block;
  white-space:pre-wrap;
  overflow-wrap:anywhere;
  word-break:break-word;

}

.cell .notice-line{

.cell .obs-countdown-wrap{

  display:flex;

  overflow:hidden;

}
.cell .obs-countdown-title{
  max-width:100%;
  white-space:nowrap;

  opacity:.95;
  margin-bottom:2px;
}
.cell .obs-countdown-time{
  max-width:100%;
  white-space:nowrap;
  font-size:clamp(18px, 3.4vw, 54px);
  font-weight:1000;
  letter-spacing:.03em;
  font-variant-numeric:tabular-nums;
}
.cell .obs-countdown-done .obs-countdown-time{
  animation:obsCountdownPulse 1.2s ease-in-out infinite;

@keyframes obsCountdownPulse{
  0%,100%{ transform:scale(1); opacity:1; }
  50%{ transform:scale(1.04); opacity:.78; }
}

</head>
<body>
<div id="overlayGrid"></div>

<script>
(function(){

const grid = document.getElementById("overlayGrid");

function nowTime(){
  const d = new Date();
  return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}

function loadData(){
  try{
    return JSON.parse(localStorage.getItem("ss_obs_9slot_layout") || "{}");
  }catch(e){
    return {};
  }
}


function readAlignData(data){
  let align = {};
  try{ align = JSON.parse(localStorage.getItem("ss_obs_slot_align") || "{}"); }catch(e){}
  if(data && data.align && typeof data.align === "object"){
    align = Object.assign({}, align, data.align);
  }
  return align;
}

function applyCellAlign(cell, alignValue){
  const v = alignValue || "center";
  if(v === "left"){
    cell.style.justifyContent = "flex-start";
    cell.style.textAlign = "left";
  }else if(v === "right"){
    cell.style.justifyContent = "flex-end";
    cell.style.textAlign = "right";
  }else{
    cell.style.justifyContent = "center";
    cell.style.textAlign = "center";
  }
}


function getObsTrunks5(){
  const out = [];
  function add(v){
    const t = String(v || "").trim();
    if(t && !out.includes(t)) out.push(t);
  }

  try{
    const direct = JSON.parse(localStorage.getItem("ss_obs_trunks_5") || "[]");
    if(Array.isArray(direct)) direct.forEach(add);
  }catch(e){}

  if(out.length < 5){
    try{
      const state = JSON.parse(localStorage.getItem("stream_manager_integrated_v1") || "{}");
      if(state && state.tree){
        if(Array.isArray(state.tree.obsTrunks)) state.tree.obsTrunks.forEach(add);
        add(state.tree.trunk);
      }
    }catch(e){}
  }

  return out.slice(0,5);
}

function renderTrunkList(cell){
  const items = getObsTrunks5();
  const ul = document.createElement("ul");
  ul.className = "trunk-list";

  (items.length ? items : ["幹が未設定です"]).slice(0,5).forEach(t=>{
    const li = document.createElement("li");
    li.textContent = t;
    ul.appendChild(li);
  });

  cell.appendChild(ul);
}

function getObsBranches5(){
  const out = [];
  function add(v){
    const t = String(v || "").replace(/^・/, "").trim();
    if(t && !out.includes(t)) out.push(t);
  }

  try{
    const direct = JSON.parse(localStorage.getItem("ss_obs_branches_5") || "[]");
    if(Array.isArray(direct)) direct.forEach(add);
  }catch(e){}

  if(out.length < 5){
    try{
      const state = JSON.parse(localStorage.getItem("stream_manager_integrated_v1") || "{}");
      if(state && state.tree){
        if(Array.isArray(state.tree.obsBranches)) state.tree.obsBranches.forEach(add);
        String(state.tree.branch || "").split(/\n+/).forEach(add);
      }
    }catch(e){}
  }

  return out.slice(0,5);
}

function renderBranchList(cell){
  const items = getObsBranches5();
  const ul = document.createElement("ul");
  ul.className = "trunk-list";

  (items.length ? items : ["サブテーマが未設定です"]).slice(0,5).forEach(t=>{
    const li = document.createElement("li");
    li.textContent = t;
    ul.appendChild(li);
  });

  cell.appendChild(ul);
}

function getObsStreamMemo(){
  function clean(v){
    return String(v || "").replace(/\r\n/g,"\n").trim();
  }

  const directKeys = [
    "ss_stream_memo","streamMemo","homeStreamMemo","broadcastMemo",
    "streamstaff_home_memo","streamstaff_memo","ss_home_memo",
    "ss_main_memo","mainMemo","配信メモ"
  ];

  for(const key of directKeys){
    const raw = localStorage.getItem(key);
    const t = clean(raw);
    if(!t) continue;
    try{
      const parsed = JSON.parse(raw);
      const parsedText = extractText(parsed);
      if(parsedText) return parsedText;
    }catch(e){
      return t;
    }
  }

  try{
    const state = JSON.parse(localStorage.getItem("stream_manager_integrated_v1") || "{}");
    const currentQuickMemo = clean(state && state.quickMemo);
    if(currentQuickMemo) return currentQuickMemo;
  }catch(e){}

  const homeQuickMemo = clean(localStorage.getItem("ss_home_quick_memo"));
  if(homeQuickMemo) return homeQuickMemo;

  return "配信メモが未設定です";
}

function extractText(v){
  if(v == null) return "";
  if(typeof v === "string" || typeof v === "number") return String(v).trim();
  if(Array.isArray(v)) return v.map(extractText).filter(Boolean).join("\n").trim();
  if(typeof v === "object"){
    const preferred = ["配信メモ","text","memo","note","notes","content","body","value","label","title"];
    for(const k of preferred){
      const t = extractText(v[k]);
      if(t) return t;
    }
    for(const item of Object.values(v)){
      const t = extractText(item);
      if(t) return t;
    }
  }
  return "";
}

function fitTextToCell(el, maxPx, minPx){
  const max = maxPx || 32;
  const min = minPx || 14;
  let size = max;
  el.style.fontSize = size + "px";
  el.style.lineHeight = "1.28";

  requestAnimationFrame(()=>{
    while(size > min && (el.scrollHeight > el.clientHeight || el.scrollWidth > el.clientWidth)){
      size -= 1;
      el.style.fontSize = size + "px";
    }
  });
}

function renderStreamMemo(cell){
  const memo = getObsStreamMemo();

  const wrap = document.createElement("div");
  wrap.className = "stream-memo-loop";

  const track = document.createElement("div");
  track.className = "stream-memo-loop-track";

  const first = document.createElement("div");
  first.className = "stream-memo-loop-copy";
  first.textContent = memo;

  const second = document.createElement("div");
  second.className = "stream-memo-loop-copy";
  second.textContent = memo;
  second.setAttribute("aria-hidden", "true");

  track.appendChild(first);
  track.appendChild(second);
  wrap.appendChild(track);
  cell.appendChild(wrap);

  requestAnimationFrame(()=>{
    const oneHeight = first.offsetHeight;
    const viewHeight = wrap.clientHeight;

    if(oneHeight <= viewHeight){
      track.style.animation = "none";
      second.style.display = "none";
      const staticText = document.createElement("div");
      staticText.className = "stream-memo-text";
      staticText.textContent = memo;
      wrap.replaceWith(staticText);
      fitTextToCell(staticText, 32, 18);
      return;
    }

    const gap = 8;
    const distance = oneHeight + gap;
    const duration = Math.max(18, Math.min(90, distance / 18));
    track.style.setProperty("--memo-loop-distance", "-" + distance + "px");
    track.style.animationDuration = duration + "s";
  });
}


function ymdLocal(d){
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function lastDayOfMonthLocal(year,monthIndex){ return new Date(year, monthIndex+1, 0).getDate(); }
function isLeapYearLocal(year){ return (year%4===0 && year%100!==0) || year%400===0; }
function effectiveMonthlyDateLocal(year,monthIndex,day){
  const d=Math.max(1,Math.min(31,Number(day)||1));
  return ymdLocal(new Date(year,monthIndex,Math.min(d,lastDayOfMonthLocal(year,monthIndex))));
}
function effectiveYearlyDateLocal(year,month,day){
  const m=Math.max(1,Math.min(12,Number(month)||1));
  let d=Math.max(1,Math.min(31,Number(day)||1));
  if(m===2 && d===29 && !isLeapYearLocal(year)) d=28;
  else d=Math.min(d,lastDayOfMonthLocal(year,m-1));
  return ymdLocal(new Date(year,m-1,d));
}
function formatNoticeEvent(ev){
  const date = String(ev.date || "").slice(5).replace("-","/") || "予定";
  const listener = String(ev.listener || ev.name || "予定").trim();
  const item = String(ev.item || ev.title || ev.text || ev.type || "").trim();
  const type = String(ev.type || "").trim();
  let body = listener;
  if(item && item !== listener) body += "：" + item;
  if(type && item !== type) body += "（" + type + "）";
  return "📢 " + date + "　" + body;
}
function getNoticeItems(){
  const out=[];
  function add(v){
    const t=String(v||"").replace(/\s+/g," ").trim();
    if(t && !out.includes(t)) out.push(t);
  }

  ["ss_notice","notice","notices","calendarNotice","ss_calendar_notice"].forEach(key=>{
    const raw=localStorage.getItem(key);
    if(!raw) return;
    try{
      const parsed=JSON.parse(raw);
      if(Array.isArray(parsed)) parsed.forEach(x=>add(extractText(x)));
      else add(extractText(parsed));
    }catch(e){ add(raw); }
  });

  try{
    const state = JSON.parse(localStorage.getItem("stream_manager_integrated_v1") || "{}");
    const today = new Date();
    for(let i=1;i<=3;i++){
      const d = new Date(today.getFullYear(), today.getMonth(), today.getDate()+i);
      const date = ymdLocal(d);
      (state.calendarEvents||[]).filter(ev=>ev && ev.date===date).forEach(ev=>add(formatNoticeEvent(ev)));
      (state.monthlyEvents||[]).forEach(ev=>{
        if(effectiveMonthlyDateLocal(d.getFullYear(), d.getMonth(), ev.day)===date){
          add(formatNoticeEvent(Object.assign({}, ev, {date, type:ev.type||"毎月予定"})));
        }
      });
      (state.yearlyEvents||[]).forEach(ev=>{
        if(effectiveYearlyDateLocal(d.getFullYear(), ev.month, ev.day)===date){
          add(formatNoticeEvent(Object.assign({}, ev, {date, type:ev.type||"毎年予定"})));
        }
      });
      (state.listeners||[]).forEach(l=>{
        const b=String(l.birthday||"").trim();
        if(!b) return;
        const mmdd=date.slice(5).replace("-","/");
        const isLeapBirthday = b==="02/29" && (!isLeapYearLocal(d.getFullYear()) ? mmdd==="02/28" : mmdd==="02/29");
        if(b===mmdd || isLeapBirthday) add("🎂 "+date.slice(5).replace("-","/")+"　"+(l.name||"常連")+"さん誕生日");
      });
    }
  }catch(e){}

  return out.length ? out : ["明日から3日間の予定はありません。"];
}
function fitNoticeLine(line, cell){
  // v235.8: お知らせは上帯/下帯の細い枠向け。
  // 短文を枠いっぱいまで巨大化させず、はみ出す時だけ縮小する。
  const h = Math.max(1, cell.clientHeight || 48);
  const baseMax = 20;
  const heightMax = Math.max(12, Math.floor(h * 0.46));
  let size = Math.min(baseMax, heightMax);
  line.style.fontSize = size + "px";
  line.style.maxWidth = "100%";
  line.style.boxSizing = "border-box";
  requestAnimationFrame(()=>{
    // 横・縦どちらも枠外に出ないように、拡大はせず縮小だけ行う。
    while(size > 10 && (line.scrollWidth > line.clientWidth || line.scrollHeight > line.clientHeight)){
      size -= 1;
      line.style.fontSize = size + "px";
    }
  });
}
function renderNoticeRotator(cell){
  const items = getNoticeItems();
  const wrap = document.createElement("div");
  wrap.className = "notice-rotator";
  const current = document.createElement("div");
  const next = document.createElement("div");
  current.className = "notice-line notice-current";
  next.className = "notice-line notice-next";
  wrap.appendChild(current);
  wrap.appendChild(next);
  cell.appendChild(wrap);

  let idx = 0;
  const layout = loadData();
  const dir = localStorage.getItem("ss_obs_notice_direction") || layout.noticeDirection || "up";
  const hold = Math.max(1, Math.min(20, Number(localStorage.getItem("ss_obs_notice_hold_seconds") || layout.noticeHoldSeconds || 3)));

  function setText(){
    current.textContent = items[idx % items.length];
    next.textContent = items[(idx + 1) % items.length];
    current.classList.remove("is-animating");
    next.classList.remove("is-animating");
    current.style.transform = "translateY(0)";
    next.style.transform = dir === "down" ? "translateY(-100%)" : "translateY(100%)";
    fitNoticeLine(current, cell);
    fitNoticeLine(next, cell);
  }
  setText();

  if(items.length <= 1) return;

  setInterval(()=>{
    current.classList.add("is-animating");
    next.classList.add("is-animating");
    if(dir === "down"){
      current.style.transform = "translateY(100%)";
      next.style.transform = "translateY(0)";
    }else{
      current.style.transform = "translateY(-100%)";
      next.style.transform = "translateY(0)";
    }
    setTimeout(()=>{
      idx = (idx + 1) % items.length;
      setText();
    }, 950);
  }, hold * 1000 + 900);
}


function getCountdownState(){
  try{return JSON.parse(localStorage.getItem("stream_manager_integrated_v1") || "{}");}
  catch(e){return {};}
}
function getObsCountdownTarget(){
  const state = getCountdownState();
  const list = Array.isArray(state.countdowns) ? state.countdowns : [];
  if(!list.length) return null;
  const wanted = localStorage.getItem("ss_obs_countdown_id") || (loadData().countdownTargetId || "");
  return list.find(c=>String(c && c.id || "") === wanted) || list[0];
}
function formatObsCountdown(ms, decimalMode){
  const done = ms <= 0;
  const safe = Math.max(0, ms);
  const total = Math.floor(safe / 1000);
  const days = Math.floor(total / 86400);
  const hours = Math.floor((total % 86400) / 3600);
  const mins = Math.floor((total % 3600) / 60);
  const secs = total % 60;
  const cs = Math.floor((safe % 1000) / 10);
  const showDecimal = decimalMode === "always" || (decimalMode === "last10" && safe <= 10000 && !done);
  const base = `${String(days).padStart(2,"0")}日 ${String(hours).padStart(2,"0")}:${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}`;
  return showDecimal ? base + "." + String(cs).padStart(2,"0") : base;
}
function fitCountdownToCell(wrap, cell){
  const time = wrap.querySelector(".obs-countdown-time");
  const title = wrap.querySelector(".obs-countdown-title");
  if(!time) return;
  const row = cell.getBoundingClientRect();
  const isThin = row.height <= 70;
  if(title) title.style.fontSize = (isThin ? 11 : 18) + "px";
  let size = isThin ? 24 : Math.min(54, Math.max(28, Math.floor(row.height * .38)));
  const min = isThin ? 12 : 18;
  time.style.fontSize = size + "px";
  requestAnimationFrame(()=>{
    while(size > min && (wrap.scrollWidth > wrap.clientWidth || wrap.scrollHeight > wrap.clientHeight || time.scrollWidth > time.clientWidth)){
      size -= 1;
      time.style.fontSize = size + "px";
    }
  });
}
function renderObsCountdown(cell){
  const c = getObsCountdownTarget();
  const wrap = document.createElement("div");
  wrap.className = "obs-countdown-wrap";
  const title = document.createElement("div");
  title.className = "obs-countdown-title";
  const time = document.createElement("div");
  time.className = "obs-countdown-time";
  if(!c){
    title.textContent = "カウントダウン";
    time.textContent = "未設定";
  }else{
    title.textContent = c.title || "カウントダウン";
    const layout = loadData();
    const mode = localStorage.getItem("ss_obs_countdown_decimal_mode") || layout.countdownDecimalMode || "last10";
    const updateCountdownText = ()=>{
      if(!wrap.isConnected) return false;
      const ms = new Date(c.target).getTime() - Date.now();
      wrap.classList.toggle("obs-countdown-done", ms <= 0);
      time.textContent = ms <= 0 ? "🎉 到達！" : formatObsCountdown(ms, mode);
      return true;
    };
    updateCountdownText();
    const intervalMs = mode === "always" || mode === "last10" ? 100 : 1000;
    const timerId = setInterval(()=>{
      if(!updateCountdownText()) clearInterval(timerId);
    }, intervalMs);
  }
  wrap.appendChild(title);
  wrap.appendChild(time);
  cell.appendChild(wrap);
  fitCountdownToCell(wrap, cell);
}

function textFor(value){
  const title = localStorage.getItem("ss_obs_title_text") || "タイトル";
  const ticker = localStorage.getItem("ss_obs_ticker_text") || "テロップ文";

  if(!value || value === "空白") return "";
  if(value === "タイトル") return title;
  if(value === "時計") return nowTime();
  if(value === "タイトル＋時計") return title + "　" + nowTime();
  if(value === "テロップ文") return ticker || "テロップ文";
  if(value === "テロップ文＋時計") return (ticker || "テロップ文") + "　" + nowTime();
  if(value === "枠のみ") return "";
  if(value === "お知らせ") return getNoticeItems().join("　/　");
  if(value === "カウントダウン"){
    const c = getObsCountdownTarget();
    if(!c) return "カウントダウン未設定";
    return (c.title || "カウントダウン") + "　" + formatObsCountdown(new Date(c.target).getTime() - Date.now(), localStorage.getItem("ss_obs_countdown_decimal_mode") || "last10");
  }
  return value;
}

function mergeRows(data){
  const m = (data.merge || {});
  function row(prefix,rowNum){
    const cap = prefix.charAt(0).toUpperCase()+prefix.slice(1);
    const left = prefix+"Left";
    const center = prefix+"Center";
    const right = prefix+"Right";

    const mergeLeft = !!m["obsMerge"+cap+"Left"];
    const mergeRight = !!m["obsMerge"+cap+"Right"];

    if(mergeLeft && mergeRight){
      return [{key:left,row:rowNum,col:1,span:3}];
    }
    if(mergeLeft){
      return [
        {key:left,row:rowNum,col:1,span:2},
        {key:right,row:rowNum,col:3,span:1}
      ];
    }
    if(mergeRight){
      return [
        {key:left,row:rowNum,col:1,span:1},
        {key:center,row:rowNum,col:2,span:2}
      ];
    }

    return [
      {key:left,row:rowNum,col:1,span:1},
      {key:center,row:rowNum,col:2,span:1},
      {key:right,row:rowNum,col:3,span:1}
    ];
  }

  return [
    ...row("top",1),
    ...row("mid",2),
    ...row("bottom",3)
  ];
}


function applyOverlayColors(data){
  const c = (data && data.colors) || {};
  const bg = c.bg || "transparent";
  const frame = c.frame || "rgba(255,255,255,.45)";
  const text = c.text || "#ffffff";
  const panel = c.panel || "rgba(0,0,0,.35)";

  if(grid){
    grid.style.background = bg === "#000000" ? "transparent" : bg;
  }

  document.querySelectorAll("#overlayGrid .cell").forEach(cell=>{
    if(cell.classList.contains("empty")) return;
    cell.style.setProperty("border-color", frame, "important");
    cell.style.setProperty("color", text, "important");
    cell.style.setProperty("background", panel, "important");
  });

  const tickerLayer = document.getElementById("ssTickerLayer");
  const tickerTrack = document.getElementById("ssTickerTrack");
  if(tickerLayer){
    // v222: テロップ専用レイヤーは過去パッチCSSの !important に負けていたため、
    // 色プリセット反映も !important 付きで上書きする。
    tickerLayer.style.setProperty("border-color", frame, "important");
    tickerLayer.style.setProperty("background", panel, "important");
  }
  if(tickerTrack){
    tickerTrack.style.setProperty("color", text, "important");
  }
}
window.ssApplyOverlayColors = applyOverlayColors;

let lastRenderSignature = "";

function render(force){

  const data = loadData();
  const signature = JSON.stringify(data) + "|" + (localStorage.getItem("ss_obs_trunks_5") || "") + "|" + (localStorage.getItem("ss_obs_trunks_ping") || "") + "|" + (localStorage.getItem("ss_obs_branches_5") || "") + "|" + (localStorage.getItem("ss_obs_branches_ping") || "") + "|memo:" + getObsStreamMemo() + "|notice:" + getNoticeItems().join("||") + "|noticeOpt:" + (localStorage.getItem("ss_obs_notice_direction")||"") + ":" + (localStorage.getItem("ss_obs_notice_hold_seconds")||"") + "|countdown:" + JSON.stringify(getObsCountdownTarget()||{}) + ":" + (localStorage.getItem("ss_obs_countdown_decimal_mode")||"");
  if(!force && signature === lastRenderSignature) return;
  lastRenderSignature = signature;

  const slots = data.slots || {};
  const alignMap = readAlignData(data);

  grid.innerHTML = "";

  mergeRows(data).forEach(item=>{

    const value = slots[item.key] || "空白";

    const cell = document.createElement("div");
    cell.className = "cell";
    applyCellAlign(cell, alignMap[item.key]);

    cell.style.gridRow = item.row;
    cell.style.gridColumn = item.col + " / span " + item.span;

    if(value === "空白"){
      cell.classList.add("empty");
    }else if(item.row === 3 && value.indexOf("テロップ") >= 0){

      // テロップは専用レイヤー #ssTickerLayer だけで表示する。
      // 枠線も専用レイヤー側で範囲に合わせて描画する。
      cell.classList.add("empty");

    }else{
      // v235.1: ドロップダウン表示名は「メインテーマ」なので、旧内部名「幹」と同じく5件リスト表示にする。
      if(value === "メインテーマ" || value === "幹"){
        renderTrunkList(cell);
      // v235.2: ドロップダウン表示名「サブテーマ」も、旧内部名「枝」と同じく5件リスト表示にする。
      }else if(value === "サブテーマ" || value === "枝"){
        renderBranchList(cell);
      }else if(value === "配信メモ"){
        renderStreamMemo(cell);
      }else if(value === "お知らせ"){
        renderNoticeRotator(cell);
      }else if(value === "カウントダウン"){
        renderObsCountdown(cell);
      }else{
        cell.textContent = textFor(value);
      }
    }

    grid.appendChild(cell);
  });

  applyOverlayColors(data);
}

render(true);

window.addEventListener("storage", ()=>render(true));
window.addEventListener("message", function(ev){ if(ev && ev.data && ev.data.type === "ssAlignChanged") render(true); });
setInterval(()=>render(false),1000);

})();
</script>

<script id="v218TickerLayerScopedScript">
(function(){
  function readJson(key, fallback){
    try{return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback));}
    catch(e){return fallback;}
  }

  function getBottomSegments(layout){
    const slots = layout.slots || {};
    const merge = layout.merge || {};

    const mergeLeft = !!merge.obsMergeBottomLeft;
    const mergeRight = !!merge.obsMergeBottomRight;

    if(mergeLeft && mergeRight){
      return [{key:"bottomLeft", start:1, span:3, value:slots.bottomLeft || "空白"}];
    }

    if(mergeLeft){
      return [
        {key:"bottomLeft", start:1, span:2, value:slots.bottomLeft || "空白"},
        {key:"bottomRight", start:3, span:1, value:slots.bottomRight || "空白"}
      ];
    }

    if(mergeRight){
      return [
        {key:"bottomLeft", start:1, span:1, value:slots.bottomLeft || "空白"},
        {key:"bottomCenter", start:2, span:2, value:slots.bottomCenter || "空白"}
      ];
    }

    return [
      {key:"bottomLeft", start:1, span:1, value:slots.bottomLeft || "空白"},
      {key:"bottomCenter", start:2, span:1, value:slots.bottomCenter || "空白"},
      {key:"bottomRight", start:3, span:1, value:slots.bottomRight || "空白"}
    ];
  }

  function isTickerValue(v){
    return v === "テロップ文" || v === "テロップ文＋時計";
  }

  function getTickerSegment(layout){
    const segments = getBottomSegments(layout);
    return segments.find(seg => isTickerValue(seg.value)) || null;
  }

  function alignClassFor(slotKey, layout){
    const align = Object.assign(
      {},
      readJson("ss_obs_slot_align", {}),
      (layout && layout.align) || {}
    );
    const v = align[slotKey] || "center";
    if(v === "left") return "align-left";
    if(v === "right") return "align-right";
    return "align-center";
  }

  function getTickerText(layout){
    return localStorage.getItem("ss_obs_ticker_text") ||
      (layout && layout.tickerText) ||
      "テロップ文";
  }

  function placeLayer(layer, segment){
    // overlayGridと同じ計算：画面左右padding 10px、gap 10px、3列。
    const pad = 10;
    const gap = 10;
    const totalW = window.innerWidth;
    const rowH = 48;
    const bottom = 10;

    const colW = (totalW - pad * 2 - gap * 2) / 3;
    const left = pad + (segment.start - 1) * (colW + gap);
    const width = colW * segment.span + gap * (segment.span - 1);

    layer.style.left = left + "px";
    layer.style.width = width + "px";
    layer.style.right = "auto";
    layer.style.bottom = bottom + "px";
    layer.style.height = rowH + "px";
  }

  function updateTickerLayer(){
    const layer = document.getElementById("ssTickerLayer");
    const track = document.getElementById("ssTickerTrack");
    if(!layer || !track) return;

    const layout = readJson("ss_obs_9slot_layout", {});
    const segment = getTickerSegment(layout);

    if(!segment){
      layer.style.display = "none";
      return;
    }

    placeLayer(layer, segment);
    layer.style.display = "block";
    track.textContent = getTickerText(layout);

    const scrollEnabled = localStorage.getItem("ss_obs_ticker_scroll") !== "false";
    const alignClass = alignClassFor(segment.key, layout);

    layer.classList.remove("is-static", "align-left", "align-center", "align-right");
    layer.classList.add(alignClass);

    if(window.ssApplyOverlayColors){
      window.ssApplyOverlayColors(layout);
    }

    if(scrollEnabled){
      layer.classList.remove("is-static");
      track.style.animation = "ssTickerMove 16s linear infinite";
      track.style.left = "0";
      track.style.right = "";
      track.style.top = "50%";
      track.style.transform = "";
    }else{
      layer.classList.add("is-static");
      track.style.animation = "none";
      track.style.left = "";
      track.style.right = "";
      track.style.top = "";
      track.style.transform = "";
    }
  }

  updateTickerLayer();

  window.addEventListener("storage", updateTickerLayer);
  window.addEventListener("resize", updateTickerLayer);
  window.addEventListener("message", function(ev){
    if(ev && ev.data && (
      ev.data.type === "ssTickerScrollChanged" ||
      ev.data.type === "ssNoticeTickerChanged" ||
      ev.data.type === "ssAlignChanged" ||
      ev.data.type === "ssOverlayRefresh"
    )){
      updateTickerLayer();
    }
  });

  setInterval(updateTickerLayer, 1000);
})();
</script>
