  to{ left:0%; transform:translateX(-100%); }

<script id="obsConfigFromUrlPatch">
(function(){
  function decodeConfig(str){
    try{return JSON.parse(decodeURIComponent(escape(atob(str))));}
    catch(e){return null;}
  }
  try{
    const params = new URLSearchParams(location.search || "");
    const raw = params.get("ssObsConfig");
    if(!raw) return;
    const cfg = decodeConfig(raw);
    if(!cfg || !cfg.localStorage) return;
    Object.keys(cfg.localStorage).forEach(function(k){
      try{ localStorage.setItem(k, String(cfg.localStorage[k])); }catch(e){}
    });
  }catch(e){}
})();
</script>

<body>
<div id="overlayGrid"></div>

<script>
(function(){

const grid = document.getElementById("overlayGrid");


function applyCompactObsLayoutFromUrl(){
  // v235.26: Chrome側の保存領域をOBSが読めない問題への対策。
  // URLには全データではなく、OBS表示に必要なミニ設定だけを入れる。
  try{
    const params = new URLSearchParams(location.search || "");
    const raw = params.get("ol");
    if(!raw) return;
    const parts = String(raw).split(".");
    if(parts[0] !== "v1" || parts.length < 9) return;

    const slotMap = {"0":"空白","1":"タイトル","2":"時計","3":"タイトル＋時計","4":"お知らせ","5":"カウントダウン","6":"配信メモ","7":"メインテーマ","8":"サブテーマ","9":"テロップ文","a":"テロップ文＋時計"};
    const alignMap = {"0":"left","1":"center","2":"right"};
    const weekMap = {"e":"en","l":"jpLong","s":"jpShort"};
    const slotOrder = ["topLeft","topCenter","topRight","midLeft","midCenter","midRight","bottomLeft","bottomCenter","bottomRight"];
    const mergeOrder = ["obsMergeTopLeft","obsMergeTopRight","obsMergeMidLeft","obsMergeMidRight","obsMergeBottomLeft","obsMergeBottomRight"];
    const slots = {};
    String(parts[1] || "").split("").forEach(function(ch,i){ if(slotOrder[i]) slots[slotOrder[i]] = slotMap[ch] || "空白"; });
    slotOrder.forEach(function(k){ if(!slots[k]) slots[k] = "空白"; });

    const mergeVal = parseInt(parts[2] || "0", 36) || 0;
    const merge = {};
    mergeOrder.forEach(function(k,i){ merge[k] = !!(mergeVal & (1 << i)); });

    const align = {};
    String(parts[3] || "").split("").forEach(function(ch,i){ if(slotOrder[i]) align[slotOrder[i]] = alignMap[ch] || "center"; });

    const colorsRaw = String(parts[6] || "");
    const colors = {
      bg: "#" + (colorsRaw.slice(0,6) || "000000"),
      frame: "#" + (colorsRaw.slice(6,12) || "555555"),
      text: "#" + (colorsRaw.slice(12,18) || "ffffff"),
      panel: "#" + (colorsRaw.slice(18,24) || "222222")
    };

    function decText(v){
      if(!v || v === "-") return "";
      try{
        while(v.length % 4) v += "=";
        return decodeURIComponent(escape(atob(v)));
      }catch(e){ return ""; }
    }

    const layout = {
      slots: slots,
      merge: merge,
      align: align,
      tickerScroll: parts[4] !== "0",
      clockWeekdayMode: weekMap[parts[5]] || "jpShort",
      colors: colors,
      titleText: decText(parts[7]),
      tickerText: decText(parts[8])
    };

    localStorage.setItem("ss_obs_9slot_layout", JSON.stringify(layout));
    localStorage.setItem("ss_obs_slot_align", JSON.stringify(align));
    localStorage.setItem("ss_obs_ticker_scroll", layout.tickerScroll ? "1" : "0");
    localStorage.setItem("ss_obs_clock_weekday_mode", layout.clockWeekdayMode);
    localStorage.setItem("ss_obs_title_text", layout.titleText || "");
    localStorage.setItem("ss_obs_ticker_text", layout.tickerText || "");
  }catch(e){}
}
applyCompactObsLayoutFromUrl();


function nowTime(){
  const d = new Date();
  return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}

function obsWeekdayLabel(d){
  const mode = localStorage.getItem("ss_obs_clock_weekday_mode") || "jpShort";
  const en = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const jp = ["日曜日","月曜日","火曜日","水曜日","木曜日","金曜日","土曜日"];
  const jps = ["日","月","火","水","木","金","土"];
  if(mode === "en") return "(" + en[d.getDay()] + ")";
  if(mode === "jpLong") return "(" + jp[d.getDay()] + ")";
  return "(" + jps[d.getDay()] + ")";
}

function nowDateWeekday(){
  const d = new Date();
  return (d.getMonth()+1) + "/" + d.getDate() + obsWeekdayLabel(d);
}

function fitClockToCell(wrap, cell){
  if(!wrap || !cell) return;
  wrap.style.fontSize = "26px";
  requestAnimationFrame(()=>{
    const maxW = Math.max(10, cell.clientWidth - 12);
    const maxH = Math.max(10, cell.clientHeight - 8);
    let size = 26;
    while(size > 13 && (wrap.scrollWidth > maxW || wrap.scrollHeight > maxH)){
      size -= 1;
      wrap.style.fontSize = size + "px";
    }
  });
}

function renderTopClock(cell, value){
  cell.classList.add("obs-top-clock");
  const title = localStorage.getItem("ss_obs_title_text") || "タイトル";
  const wrap = document.createElement("div");
  wrap.className = "obs-clock-wrap";
  const date = document.createElement("span");
  date.className = "obs-clock-date";
  date.textContent = nowDateWeekday();
  const time = document.createElement("span");
  time.className = "obs-clock-time";
  time.textContent = nowTime();
  if(value === "タイトル＋時計"){
    const ttl = document.createElement("span");
    ttl.className = "obs-clock-title";
    ttl.textContent = title;
    wrap.appendChild(ttl);
  }
  wrap.appendChild(date);
  wrap.appendChild(time);
  cell.appendChild(wrap);
  fitClockToCell(wrap, cell);
}

function loadData(){
  const fallback = {
    slots:{topLeft:"空白",topCenter:"時計",topRight:"空白",midLeft:"空白",midCenter:"空白",midRight:"空白",bottomLeft:"テロップ文",bottomCenter:"空白",bottomRight:"空白"},
    merge:{},
    align:{}
  };
  try{
    const raw = localStorage.getItem("ss_obs_9slot_layout");
    if(!raw) return fallback;
    const parsed = JSON.parse(raw || "{}");
    if(!parsed || !parsed.slots) return Object.assign({}, fallback, parsed || {});
    return parsed;
  }catch(e){
    return fallback;
  }
}


function readAlignData(data){
  let align = {};
  try{ align = JSON.parse(localStorage.getItem("ss_obs_slot_align") || "{}"); }catch(e){}
  if(data && data.align && typeof data.align === "object"){
    align = Object.assign({}, align, data.align);
  }
  return align;
}

function applyCellAlign(cell, alignValue){
  const v = alignValue || "center";
  if(v === "left"){
    cell.style.justifyContent = "flex-start";
    cell.style.textAlign = "left";
  }else if(v === "right"){
    cell.style.justifyContent = "flex-end";
    cell.style.textAlign = "right";
  }else{
    cell.style.justifyContent = "center";
    cell.style.textAlign = "center";
  }
}


function getObsTrunks5(){
  const out = [];
  function add(v){
    const t = String(v || "").trim();
    if(t && !out.includes(t)) out.push(t);
  }

  try{
    const direct = JSON.parse(localStorage.getItem("ss_obs_trunks_5") || "[]");
    if(Array.isArray(direct)) direct.forEach(add);
  }catch(e){}

  if(out.length < 5){
    try{
      const state = JSON.parse(localStorage.getItem("stream_manager_integrated_v1") || "{}");
      if(state && state.tree){
        if(Array.isArray(state.tree.obsTrunks)) state.tree.obsTrunks.forEach(add);
        add(state.tree.trunk);
      }
    }catch(e){}
  }

  return out.slice(0,5);
}

function renderTrunkList(cell){
  const items = getObsTrunks5();
  const ul = document.createElement("ul");
  ul.className = "trunk-list";

  (items.length ? items : ["幹が未設定です"]).slice(0,5).forEach(t=>{
    const li = document.createElement("li");
    li.textContent = t;
    ul.appendChild(li);
  });

  cell.appendChild(ul);
}

function getObsBranches5(){
  const out = [];
  function add(v){
    const t = String(v || "").replace(/^・/, "").trim();
    if(t && !out.includes(t)) out.push(t);
  }

  try{
    const direct = JSON.parse(localStorage.getItem("ss_obs_branches_5") || "[]");
    if(Array.isArray(direct)) direct.forEach(add);
  }catch(e){}

  if(out.length < 5){
    try{
      const state = JSON.parse(localStorage.getItem("stream_manager_integrated_v1") || "{}");
      if(state && state.tree){
        if(Array.isArray(state.tree.obsBranches)) state.tree.obsBranches.forEach(add);
        String(state.tree.branch || "").split(/\n+/).forEach(add);
      }
    }catch(e){}
  }

  return out.slice(0,5);
}

function renderBranchList(cell){
  const items = getObsBranches5();
  const ul = document.createElement("ul");
  ul.className = "trunk-list";

  (items.length ? items : ["サブテーマが未設定です"]).slice(0,5).forEach(t=>{
    const li = document.createElement("li");
    li.textContent = t;
    ul.appendChild(li);
  });

  cell.appendChild(ul);
}

function getObsStreamMemo(){
  function clean(v){
    return String(v || "").replace(/\r\n/g,"\n").trim();
  }

  const directKeys = [
    "ss_stream_memo","streamMemo","homeStreamMemo","broadcastMemo",
    "streamstaff_home_memo","streamstaff_memo","ss_home_memo",
    "ss_main_memo","mainMemo","配信メモ"
  ];

  for(const key of directKeys){
    const raw = localStorage.getItem(key);
    const t = clean(raw);
    if(!t) continue;
    try{
      const parsed = JSON.parse(raw);
      const parsedText = extractText(parsed);
      if(parsedText) return parsedText;
    }catch(e){
      return t;
    }
  }

  try{
    const state = JSON.parse(localStorage.getItem("stream_manager_integrated_v1") || "{}");
    const currentQuickMemo = clean(state && state.quickMemo);
    if(currentQuickMemo) return currentQuickMemo;
  }catch(e){}

  const homeQuickMemo = clean(localStorage.getItem("ss_home_quick_memo"));
  if(homeQuickMemo) return homeQuickMemo;

  return "配信メモが未設定です";
}

function extractText(v){
  if(v == null) return "";
  if(typeof v === "string" || typeof v === "number") return String(v).trim();
  if(Array.isArray(v)) return v.map(extractText).filter(Boolean).join("\n").trim();
  if(typeof v === "object"){
    const preferred = ["配信メモ","text","memo","note","notes","content","body","value","label","title"];
    for(const k of preferred){
      const t = extractText(v[k]);
      if(t) return t;
    }
    for(const item of Object.values(v)){
      const t = extractText(item);
      if(t) return t;
    }
  }
  return "";
}

function fitTextToCell(el, maxPx, minPx){
  const max = maxPx || 32;
  const min = minPx || 14;
  let size = max;
  el.style.fontSize = size + "px";
  el.style.lineHeight = "1.28";

  requestAnimationFrame(()=>{
    while(size > min && (el.scrollHeight > el.clientHeight || el.scrollWidth > el.clientWidth)){
      size -= 1;
      el.style.fontSize = size + "px";
    }
  });
}

function renderStreamMemo(cell){
  const memo = getObsStreamMemo();

  const wrap = document.createElement("div");
  wrap.className = "stream-memo-loop";

  const track = document.createElement("div");
  track.className = "stream-memo-loop-track";

  const first = document.createElement("div");
  first.className = "stream-memo-loop-copy";
  first.textContent = memo;

  const second = document.createElement("div");
  second.className = "stream-memo-loop-copy";
  second.textContent = memo;
  second.setAttribute("aria-hidden", "true");

  track.appendChild(first);
  track.appendChild(second);
  wrap.appendChild(track);
  cell.appendChild(wrap);

  requestAnimationFrame(()=>{
    const oneHeight = first.offsetHeight;
    const viewHeight = wrap.clientHeight;

    if(oneHeight <= viewHeight){
      track.style.animation = "none";
      second.style.display = "none";
      const staticText = document.createElement("div");
      staticText.className = "stream-memo-text";
      staticText.textContent = memo;
      wrap.replaceWith(staticText);
      fitTextToCell(staticText, 32, 18);
      return;
    }

    const gap = 8;
    const distance = oneHeight + gap;
    const duration = Math.max(18, Math.min(90, distance / 18));
    track.style.setProperty("--memo-loop-distance", "-" + distance + "px");
    track.style.animationDuration = duration + "s";
  });
}


function ymdLocal(d){
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");

function isLeapYearLocal(year){ return (year%4===0 && year%100!==0) || year%400===0; }
function effectiveMonthlyDateLocal(year,monthIndex,day){
  const d=Math.max(1,Math.min(31,Number(day)||1));
  return ymdLocal(new Date(year,monthIndex,Math.min(d,lastDayOfMonthLocal(year,monthIndex))));
}
function effectiveYearlyDateLocal(year,month,day){
  const m=Math.max(1,Math.min(12,Number(month)||1));
  let d=Math.max(1,Math.min(31,Number(day)||1));
  if(m===2 && d===29 && !isLeapYearLocal(year)) d=28;

function formatObsCountdown(ms, decimalMode){
  const done = ms <= 0;
  const safe = Math.max(0, ms);
  const total = Math.floor(safe / 1000);
  const days = Math.floor(total / 86400);
  const hours = Math.floor((total % 86400) / 3600);
  const mins = Math.floor((total % 3600) / 60);
  const secs = total % 60;
  const cs = Math.floor((safe % 1000) / 10);
  const showDecimal = !done && (decimalMode === "always" || (decimalMode === "lastHour" && safe < 3600000) || (decimalMode === "last10" && safe < 10000));
  if(days > 0){
    return `${days}日 ${String(hours).padStart(2,"0")}:${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}`;
  }
  if(hours > 0){
    const base = `${String(hours).padStart(2,"0")}:${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}`;
    return decimalMode === "always" ? base + "." + String(cs).padStart(2,"0") : base;
  }
  const base = `${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}`;
  return showDecimal ? base + "." + String(cs).padStart(2,"0") : base;
}
function formatObsCountdownLine(c, ms, decimalMode){
  const title = (c && c.title ? String(c.title).trim() : "カウントダウン") || "カウントダウン";
  if(ms <= 0) return `${title} 到達！`;
  return `${title}まで残り ${formatObsCountdown(ms, decimalMode)}`;
}
function fitCountdownToCell(wrap, cell){
  const time = wrap.querySelector(".obs-countdown-time");
  if(!time) return;

  // v235.13: renderObsCountdown は cell を grid に追加する前にも呼ばれる。

  if(!cell.isConnected || !wrap.isConnected){
    requestAnimationFrame(()=>fitCountdownToCell(wrap, cell));
    return;
  }

  const row = cell.getBoundingClientRect();
  if(!row || row.height < 8 || row.width < 8){
    requestAnimationFrame(()=>fitCountdownToCell(wrap, cell));
    return;
  }

  const isThin = row.height <= 70;
  let size = isThin ? Math.min(28, Math.max(14, Math.floor(row.height * .42))) : Math.min(54, Math.max(24, Math.floor(row.height * .46)));
  const min = isThin ? 10 : 14;
  time.style.fontSize = size + "px";
  requestAnimationFrame(()=>{
    while(size > min && (wrap.scrollWidth > wrap.clientWidth || wrap.scrollHeight > wrap.clientHeight || time.scrollWidth > time.clientWidth)){
      size -= 1;
      time.style.fontSize = size + "px";

  });
}

function mergeRows(data){

    const mergeRight = !!m["obsMerge"+cap+"Right"];

    if(mergeLeft && mergeRight){
      return [{key:left,row:rowNum,col:1,span:3}];
    }
    if(mergeLeft){
      return [
        {key:left,row:rowNum,col:1,span:2},
        {key:right,row:rowNum,col:3,span:1}
      ];
    }
    if(mergeRight){
      return [
        {key:left,row:rowNum,col:1,span:1},
        {key:center,row:rowNum,col:2,span:2}
      ];
    }

    return [
      {key:left,row:rowNum,col:1,span:1},
      {key:center,row:rowNum,col:2,span:1},
      {key:right,row:rowNum,col:3,span:1}

  ];

  }

  function getTickerText(layout, segment){
    const base = localStorage.getItem("ss_obs_ticker_text") ||
      (layout && layout.tickerText) ||
      "テロップ文";
    // v235.15: 下段の「テロップ文＋時計」は専用テロップレイヤーで流すため、
    // 通常セルの textFor() ではなくここで時計を合成する。
    if(segment && segment.value === "テロップ文＋時計"){
      return base + "　" + tickerNowTime();
    }
    return base;
  }

  function placeLayer(layer, segment){
    // overlayGridと同じ計算：画面左右padding 10px、gap 10px、3列。
    const pad = 10;
    const gap = 10;
    const totalW = window.innerWidth;
    const rowH = 48;
    const bottom = 10;

    const colW = (totalW - pad * 2 - gap * 2) / 3;
    const left = pad + (segment.start - 1) * (colW + gap);
    const width = colW * segment.span + gap * (segment.span - 1);

    layer.style.left = left + "px";
    layer.style.width = width + "px";
    layer.style.right = "auto";
    layer.style.bottom = bottom + "px";
    layer.style.height = rowH + "px";
  }

  function updateTickerLayer(){
    // v235.17: 下段テロップは本番グリッドセル内で描画するため、旧専用レイヤーは常に停止。
    const oldLayer = document.getElementById("ssTickerLayer");
    if(oldLayer) oldLayer.style.display = "none";
    return;
    const layer = document.getElementById("ssTickerLayer");
    const track = document.getElementById("ssTickerTrack");
    if(!layer || !track) return;

    const layout = readJson("ss_obs_9slot_layout", {});
    const segment = getTickerSegment(layout);

    if(!segment){
      layer.style.display = "none";
      return;
    }

    placeLayer(layer, segment);
    layer.style.display = "block";
    track.textContent = getTickerText(layout, segment);

    const scrollEnabled = localStorage.getItem("ss_obs_ticker_scroll") !== "false";
    const alignClass = alignClassFor(segment.key, layout);

    layer.classList.remove("is-static", "align-left", "align-center", "align-right");
    layer.classList.add(alignClass);

    if(window.ssApplyOverlayColors){
      window.ssApplyOverlayColors(layout);
    }

    if(scrollEnabled){
      layer.classList.remove("is-static");
      track.style.animation = "ssTickerMove 16s linear infinite";
      track.style.left = "0";
      track.style.right = "";
      track.style.top = "50%";
      track.style.transform = "";
    }else{
      layer.classList.add("is-static");
      track.style.animation = "none";
      track.style.left = "";
      track.style.right = "";
      track.style.top = "";
      track.style.transform = "";
    }
  }

  updateTickerLayer();

  window.addEventListener("storage", updateTickerLayer);
  window.addEventListener("resize", updateTickerLayer);
  window.addEventListener("message", function(ev){
    if(ev && ev.data && (
      ev.data.type === "ssTickerScrollChanged" ||
      ev.data.type === "ssNoticeTickerChanged" ||
      ev.data.type === "ssAlignChanged" ||
      ev.data.type === "ssOverlayRefresh"
    )){
      updateTickerLayer();
    }
  });

  setInterval(updateTickerLayer, 1000);
})();
</script>



<script id="v235_25ShortUrlRealtimeSnapshotReceiver">
(function(){
  // v235.25: 短URLのまま、ホーム/プレビューから渡されたOBS設定スナップショットをoverlay側へ反映。
  const CHANNEL_NAME = "streamstaff_obs_overlay_live_v235";
  const SNAPSHOT_KEY = "ss_obs_overlay_live_snapshot_v235";
  let channel = null;
  try{ if("BroadcastChannel" in window) channel = new BroadcastChannel(CHANNEL_NAME); }catch(e){ channel = null; }

  function forceRender(){
    try{
      if(typeof render === "function") render(true);
    }catch(e){}
    try{ window.dispatchEvent(new StorageEvent("storage", {key:"ss_obs_9slot_layout"})); }catch(e){}
  }

  function applySnapshot(payload){
    if(!payload || payload.type !== "ss_obs_live_snapshot" || !payload.values) return;
    Object.keys(payload.values).forEach(function(key){
      try{ localStorage.setItem(key, String(payload.values[key])); }catch(e){}
    });
    forceRender();
  }

  try{
    const raw = localStorage.getItem(SNAPSHOT_KEY);
    if(raw) applySnapshot(JSON.parse(raw));
  }catch(e){}

  if(channel){
    channel.onmessage = function(ev){ applySnapshot(ev && ev.data); };
  }

  window.addEventListener("message", function(ev){
    if(ev && ev.data && ev.data.type === "ss_obs_live_snapshot") applySnapshot(ev.data);
  });

  setInterval(function(){
    try{
      const raw = localStorage.getItem(SNAPSHOT_KEY);
      if(raw) applySnapshot(JSON.parse(raw));
    }catch(e){}
  }, 1000);
})();
</script>
