<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>StreamStaff 投票</title>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<style>
body{
  margin:0;
  min-height:100vh;
  background:radial-gradient(circle at top,#211342,#05060a 58%);
  color:#fff;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
}
.card{
  width:min(520px,100%);
  background:#0b0d13;
  border:1px solid #2e3350;
  border-radius:24px;
  padding:20px;
  box-shadow:0 22px 70px #0009;
}
h1{margin:0 0 8px;font-size:28px}
.muted{color:#aab2c8}
.option{
  width:100%;
  border:1px solid #343b58;
  background:#111827;
  color:white;
  border-radius:16px;
  padding:14px;
  margin-top:10px;
  font-weight:900;
  font-size:18px;
}
.option:active{transform:scale(.98)}
.done{
  display:none;
  margin-top:14px;
  background:#102a1f;
  border:1px solid #22c55e;
  border-radius:16px;
  padding:14px;
  color:#bbf7d0;
}
.warn{
  margin-top:14px;
  background:#2a1907;
  border:1px solid #f59e0b;
  border-radius:16px;
  padding:12px;
  color:#fed7aa;
  font-size:14px;
  white-space:pre-wrap;
}
.live{
  display:inline-block;
  margin-top:8px;
  border:1px solid #22c55e66;
  color:#86efac;
  background:#13251b;
  border-radius:999px;
  padding:4px 8px;
  font-size:12px;
  font-weight:900;
}
</style>
</head>
<body>
  <div class="card">
    <div class="muted">StreamStaff 投票ページ</div>
    <h1 id="title">投票</h1>
    <div id="status" class="muted">準備中...</div>
    <div id="liveBadge" class="live" style="display:none">Firebase LIVE</div>
    <div id="options"></div>
    <div id="done" class="done">投票ありがとう！</div>
    <div id="warn" class="warn" style="display:none"></div>
  </div>

<script>
const params=new URLSearchParams(location.search);

function decodeUrlData(str){
  // URLSearchParams has already decoded percent encoding.
  // Convert base64 encoded UTF-8 JSON back to object.
  const bin=atob(str);
  const bytes=new Uint8Array(Array.from(bin, ch=>ch.charCodeAt(0)));
  return JSON.parse(new TextDecoder().decode(bytes));
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
}
function normalizeOptions(raw){
  if(!raw) return [];
  if(Array.isArray(raw)){
    return raw.map(o=>{
      if(typeof o==="string") return {text:o,votes:0};
      return {text:String(o.text||""), votes:Number(o.votes||0)};
    }).filter(o=>o.text);
  }
  if(typeof raw==="string"){
    // support both | and comma separated old URLs
    return raw.split("|").flatMap(x=>x.split(",")).map(x=>x.trim()).filter(Boolean).map(text=>({text,votes:0}));
  }
  return [];
}
function showWarn(msg){
  const w=document.getElementById("warn");
  w.textContent=msg;
  w.style.display="block";
}

let payload={poll:"",title:"投票",options:[]};

try{
  const data=params.get("data");
  if(data){
    payload=decodeUrlData(data);
  }
}catch(e){
  console.error("data parse failed", e);
}

if(!payload.poll && params.get("poll")) payload.poll=params.get("poll");
if((!payload.title || payload.title==="投票") && params.get("title")) payload.title=params.get("title");
if((!payload.options || !payload.options.length) && params.get("options")) payload.options=params.get("options");

const pollId=payload.poll || "";
const title=payload.title || "投票";
let currentOptions=normalizeOptions(payload.options);
const fb=params.get("fb");

document.getElementById("title").textContent=title;

function renderOptions(options, live){
  const box=document.getElementById("options");
  const list=normalizeOptions(options);
  if(!list.length){
    box.innerHTML="<p class='muted'>選択肢がありません</p>";
    return;
  }
  box.innerHTML=list.map((o,i)=>`<button class="option" data-i="${i}">${escapeHtml(o.text)}</button>`).join("");
  box.querySelectorAll(".option").forEach(btn=>{
    btn.onclick=()=>vote(Number(btn.dataset.i), live);
  });
}

let db=null;
let docRef=null;

async function vote(index, live){
  if(!live || !docRef){
    document.getElementById("done").style.display="block";
    return;
  }
  try{
    await db.runTransaction(async tx=>{
      const snap=await tx.get(docRef);
      if(!snap.exists) throw new Error("poll not found");
      const data=snap.data();
      const opts=normalizeOptions(data.options && data.options.length ? data.options : currentOptions);
      opts[index].votes=Number(opts[index].votes||0)+1;
      tx.update(docRef,{options:opts,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
    });
    document.getElementById("done").style.display="block";
  }catch(e){
    alert("投票に失敗。時間を置いてもう一回お願いｗ");
    console.error(e);
  }
}

async function start(){
  if(!fb || !pollId){
    document.getElementById("status").textContent="見本モード";
    renderOptions(currentOptions,false);
    if(!currentOptions.length){
      showWarn("URLから選択肢を読み取れませんでした。\nStreamStaff側で投票を作り直して、URL / QR表示から開いてください。");
    }else{
      showWarn("Firebase設定がURLに入っていないため、今は見本ページです。");
    }
    return;
  }

  try{
    const cfg=decodeUrlData(fb);
    firebase.initializeApp(cfg);
    db=firebase.firestore();
    docRef=db.collection("streamstaff_polls").doc(pollId);

    document.getElementById("status").textContent="リアルタイム投票受付中";
    document.getElementById("liveBadge").style.display="inline-block";

    // Ensure document has at least URL options.
    const firstSnap=await docRef.get();
    if(!firstSnap.exists){
      await docRef.set({
        id:pollId,
        title:title,
        options:currentOptions,
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      });
    }else{
      const data=firstSnap.data();
      const firestoreOptions=normalizeOptions(data.options);
      if(firestoreOptions.length){
        currentOptions=firestoreOptions;
      }else if(currentOptions.length){
        await docRef.set({
          id:pollId,
          title:title,
          options:currentOptions,
          updatedAt:firebase.firestore.FieldValue.serverTimestamp()
        },{merge:true});
      }
    }

    docRef.onSnapshot(snap=>{
      if(!snap.exists){
        renderOptions(currentOptions,true);
        return;
      }
      const data=snap.data();
      const opts=normalizeOptions(data.options);
      if(opts.length) currentOptions=opts;
      document.getElementById("title").textContent=data.title || title;
      renderOptions(currentOptions,true);
      if(!currentOptions.length){
        showWarn("Firebaseには接続できましたが、選択肢データがありません。主側でFirebase同期を押してからURLを出してください。");
      }
    });
  }catch(e){
    console.error(e);
    document.getElementById("status").textContent="Firebase接続エラー";
    renderOptions(currentOptions,false);
    showWarn("Firebase接続エラー。\n設定やFirestoreルールを確認してください。\n\n" + (e.message || e));
  }
}
start();
</script>
</body>
</html>
